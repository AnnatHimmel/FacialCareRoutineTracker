name: skincare_tracker
description: "A personal skincare routine tracker app with Hebrew RTL interface."
publish_to: 'none'

version: 1.3.0+6

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  drift: ^2.18.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.24
  shared_preferences: ^2.2.3
  archive: ^3.4.10
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  file_picker: ^8.0.0
  flutter_image_compress: ^2.2.0
  path_provider: ^2.1.3
  google_fonts: ^6.2.1
  intl: ^0.20.0
  go_router: ^14.2.0
  uuid: ^4.4.0
  meta: ^1.12.0
  web: ^1.1.1
  url_launcher: ^6.3.0
  package_info_plus: ^8.3.0
  http: ^1.2.2
  collection: ^1.18.0
  mobile_scanner: ^7.2.0
  supabase_flutter: ^2.14.2
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.14.3

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/products/
    - assets/images/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#fce8e2"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21
