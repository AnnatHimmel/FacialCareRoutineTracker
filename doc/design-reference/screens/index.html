<style>
  html, body { background: #fff8f6; color: #251815; font-family: 'Quicksand', sans-serif; -webkit-tap-highlight-color: transparent; }

  /* phone shell */
  .phone-shell {
    width: 100%;
    max-width: 420px;
    min-height: 100dvh;
    margin: 0 auto;
    background: #fff8f6;
    position: relative;
  }
  @media (min-width: 480px) {
    body { background: linear-gradient(180deg, #fce3dd 0%, #fff1ed 50%, #ffe9e4 100%); padding: 24px 0; }
    .phone-shell {
      min-height: 880px;
      border-radius: 44px;
      box-shadow: 0 30px 80px rgba(158, 65, 44, 0.18), 0 0 0 10px #1a0f0c, 0 0 0 12px #2a1a15;
      overflow: hidden;
    }
  }
  /* hide scrollbars for category chip rail */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }
  /* shimmer for streak banner */
  .streak-gradient {
    background:
      radial-gradient(120% 70% at 100% 0%, rgba(255,255,255,0.35) 0%, transparent 50%),
      linear-gradient(135deg, #ff8b71 0%, #f06b50 60%, #de7a5e 100%);
  }
  .glass {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  /* simple fade-in for tab transitions */
  .screen-enter { animation: fadeIn .25s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  /* striped placeholder */
  .placeholder-stripe {
    background-image: repeating-linear-gradient(135deg, #f6ddd8 0 6px, #fce3dd 6px 12px);
  }
  /* checkbox tick stroke animation */
  .tick { transition: transform .15s ease; }
  .done .tick { transform: scale(1); }
  /* hide native scrollbar on the scroll area */
  .scroll-area { overflow-y: auto; overflow-x: hidden; }
  .scroll-area::-webkit-scrollbar { width: 0; }
  /* drag handle */
  .drag-dots {
    background-image: radial-gradient(currentColor 1.2px, transparent 1.2px);
    background-size: 4px 4px;
    background-repeat: repeat;
  }
